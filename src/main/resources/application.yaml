spring:
  application:
    name: hrm-tool-next-gen
  profiles:
    active: '@spring.profiles.active@'
  output:
    ansi:
      enabled: always
  mail:
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          timeout: 5000
  devtools:
    restart:
      enabled: false
      poll-interval: 2s
      quiet-period: 1s
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    show-sql: false
    generate-ddl: false
    properties:
      format_sql: true
      session:
        events:
          log:
            LOG_QUERIES_SLOWER_THAN_MS: 1000
      hibernate:
        jdbc:
          batch_size: 200
          order_inserts: true
          order_updates: true
          batch_versioned_data: true
          generate_statistics: true
  servlet:
    multipart:
      enabled: true
      file-size-threshold: 15MB
      max-file-size: 20MB
      max-request-size: 20MB
  liquibase:
    enabled: true
    url: '${spring.datasource.url}'
    user: '${spring.datasource.username}'
    password: '${spring.datasource.password}'
    driver-class-name: '${spring.datasource.driverClassName}'
    change-log: classpath:/db/master.xml
    database-change-log-table: database-liquibase-changelog
    database-change-log-lock-table: database-liquibase-changelog-lock
    show-summary-output: console
    show-summary: summary

  rabbitmq:
    virtual-host: local
    connection-timeout: PT5S
    listener:
      simple:
        retry:
          enabled: true
          initial-interval: PT2S
          max-attempts: 3
          multiplier: 1.5
          max-interval: PT10S
application:
  name: '@project.artifactId@'
build:
  version: '@project.version@'
  timestamp: '@timestamp@'
logging:
  level:
    com:
      minhpt:
        hrmtoolnextgen: DEBUG
hrm:
  app:
    jwtSecret: ${JWT_SECRET}
    # During key rotation: set this to the old JWT_SECRET value.
    # Tokens signed with the previous key remain valid until they expire.
    # Clear this once all previously-issued tokens have expired.
    jwtSecretPrevious: ${JWT_SECRET_PREVIOUS:}
    jwtExpiration: '86400000'
    refreshTokenExpiration: '86400000'
    resetPasswordTokenExpiration: '3600000'  # 1 hour in milliseconds
    frontend:
      url: ${FRONTEND_URL:http://localhost:3000}  # Frontend URL for password reset links
  api:
    prefix: /api
  security:
    swagger-enabled: false

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
    version: OPENAPI_3_1
  packagesToScan: com.minhpt.hrmtoolnextgen.controller

management:
  endpoint:
    prometheus:
      access: read-only
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  prometheus:
    metrics:
      export:
        enabled: true
